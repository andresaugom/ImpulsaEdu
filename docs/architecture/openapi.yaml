  # ==========================================================================
  # DONATIONS
  # ==========================================================================
  /api/v1/donations:
    get:
      tags: [donations]
      summary: List donations
      security:
        - bearerAuth: []
      parameters:
        - name: school_id
          in: query
          schema:
            type: string
            format: uuid
        - name: donor_id
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: string
            enum: [registered, approved, in_delivery, delivered, completed, cancelled]
        - name: type
          in: query
          schema:
            type: string
            enum: [monetary, material]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated donation list
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/DonationSummary'
                  - $ref: '#/components/schemas/PaginationMeta'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [donations]
      summary: Create a donation record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DonationCreateRequest'
      responses:
        '201':
          description: Donation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DonationDetail'
        '400':
          description: Missing required field (e.g. amount for monetary, estimated_value for material)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: donor_id or school_id not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: School is archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

