<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - ImpulsaEdu</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="../../public/ImpulsaEdu.svg" alt="Logo de ImpulsaEdu">
      </div>
      
      <form>
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="tu@ejemplo.com" 
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Ingresa tu contraseña" 
            required
          >
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" name="remember"> Recuérdame
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Iniciar Sesión</button>
      </form>

      <div style="text-align: center; margin-top: 20px; color: var(--text-secondary); font-size: 14px;">
        ¿No tienes una cuenta? <a href="#" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Contacta a tu administrador</a>
      </div>
    </div>
  </div>
</body>
</html>
