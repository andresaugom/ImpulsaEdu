# CI — Lint & Test
name: CI

on:
  push:
    # Trigger on any push to any branch
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows you to run it manually from the Actions tab

env:
  # Global defaults for the runner
  DB_HOST: 127.0.0.1
  DB_PORT: "5432"
  DB_NAME: test
  DB_USER: test
  DB_PASSWORD: test
  PGPASSWORD: test

jobs:
  # ── api-service: integration & migration ───────────────────────────────────
  database-integration:
    name: Run Migrations and API Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend/app_api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/app_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Start database and run migration
        # Uses the env variables defined at the top
        run: psql -h $DB_HOST -U $DB_USER -d $DB_NAME -v ON_ERROR_STOP=1 -f ../../db/schema.sql

      - name: Run tests
        run: npm test
        env:
          # Explicitly injecting credentials to ensure Node/Jest picks them up
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: test-secret-for-ci
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER_NAME: ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}

  # ── frontend: lint ─────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint