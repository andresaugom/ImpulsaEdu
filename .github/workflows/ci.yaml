# CI — Lint & Test & Build
name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  # These are "test-only" credentials for the temporary runner database
  DB_HOST: 127.0.0.1
  DB_PORT: "5432"
  DB_NAME: test
  DB_USER: test
  DB_PASSWORD: test
  PGPASSWORD: test

jobs:
  # ── api-service: integration & migration ───────────────────────────────────
  database-integration:
    name: Run Migrations and API Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend/app_api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/app_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Start database and run migration
        run: |
          psql -h $DB_HOST -U $DB_USER -d $DB_NAME -v ON_ERROR_STOP=1 -f ../../db/schema.sql
          psql -h $DB_HOST -U $DB_USER -d $DB_NAME -v ON_ERROR_STOP=1 -f ../../db/triggers.sql

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret-for-ci
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER_NAME: ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}

  # ── frontend: lint ─────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ── Backend: Build ─────────────────────────────────────────────────────────
  build-backend:
    name: Build backend
    needs: database-integration # Only runs if tests pass
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/app_api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/app_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --if-present

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-artifacts
          path: backend/app_api/
          if-no-files-found: warn

  # ── Frontend: Build ────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    needs: lint-frontend # Only runs if linting passes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-artifacts
          # Covers common build output directories (Next.js, Vite/React, raw builds)
          path: |
            frontend/.next/
            frontend/dist/
            frontend/build/
            frontend/out/
          if-no-files-found: ignore