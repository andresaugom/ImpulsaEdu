# CI — Lint & Test
#
# Runs on every pull request targeting main or develop.
# Jobs are independent and run in parallel.
#
# Required: no secrets needed for this workflow.

name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ── api-service: unit tests ────────────────────────────────────────────────
  test-api-service:
    name: Test api-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/app_api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/app_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Tests mock DB calls; these are placeholders to satisfy dotenv
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: test-secret-for-ci

  # ── frontend: lint ─────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
