# CI — Lint & Test
#
# Runs on every pull request targeting main.
# Jobs are independent and run in parallel.
#
# Required: no secrets needed for this workflow.

name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  # ── api-service: unit tests ────────────────────────────────────────────────
  test-api-service:
    name: Test api-service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: impulsaedu
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend/app_api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/app_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start Database and Run Migrations
        run: |
          psql -h localhost -U postgres -d impulsaedu -f ../../db/schema.sql
        env:
          PGPASSWORD: postgrespassword

      - name: Run tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: impulsaedu
          DB_USER: postgres
          DB_PASSWORD: postgrespassword
          JWT_SECRET: test-secret-for-ci
          # Mock connections for other services
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=fake;AccountKey=fake;EndpointSuffix=core.windows.net"
          AZURE_STORAGE_CONTAINER_NAME: "schools"

  # ── frontend: lint ─────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
