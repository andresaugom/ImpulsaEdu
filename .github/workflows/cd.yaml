# CD — main → impulsa
#
# Triggered on every push/merge to the main branch.
# Builds all three service images, pushes them to ACR tagged with the git
# commit SHA, then rolls out the new images in the impulsa namespace.
#
# Required GitHub Actions secrets:
#   AZURE_CREDENTIALS, ACR_NAME, ACR_LOGIN_SERVER, AZURE_RESOURCE_GROUP, AKS_CLUSTER_NAME,
#   DB_PASSWORD, JWT_SECRET

name: CD — main

on:
  push:
    branches:
      - main

env:
  NAMESPACE: impulsa

jobs:
  build-push-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Compute a short, deterministic image tag ──────────────────────────
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # ── Authenticate to Azure ─────────────────────────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Log in to ACR so docker can push ─────────────────────────────────
      - name: ACR login
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      # ── Build & push api-service ──────────────────────────────────────────
      - name: Build api-service
        run: |
          docker build \
            -t "${{ secrets.ACR_LOGIN_SERVER }}/impulsaedu-api-service:${{ steps.tag.outputs.IMAGE_TAG }}" \
            -f backend/app_api/Dockerfile \
            backend/app_api
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/impulsaedu-api-service:${{ steps.tag.outputs.IMAGE_TAG }}"

      # ── Build & push auth-service ─────────────────────────────────────────
      - name: Build auth-service
        run: |
          docker build \
            -t "${{ secrets.ACR_LOGIN_SERVER }}/impulsaedu-auth-service:${{ steps.tag.outputs.IMAGE_TAG }}" \
            -f backend/auth/Dockerfile \
            backend/auth
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/impulsaedu-auth-service:${{ steps.tag.outputs.IMAGE_TAG }}"

      # ── Build & push frontend ─────────────────────────────────────────────
      - name: Build frontend
        run: |
          docker build \
            -t "${{ secrets.ACR_LOGIN_SERVER }}/impulsaedu-frontend:${{ steps.tag.outputs.IMAGE_TAG }}" \
            -f frontend/Dockerfile \
            frontend
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/impulsaedu-frontend:${{ steps.tag.outputs.IMAGE_TAG }}"

      # ── Get AKS credentials ───────────────────────────────────────────────
      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      # ── Inject secrets into the cluster ──────────────────────────────────
      - name: Apply Kubernetes secrets
        run: |
          kubectl create secret generic impulsa-secrets \
            -n "$NAMESPACE" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Apply database init ConfigMap ─────────────────────────────────────
      # The ConfigMap is generated from the canonical SQL files in db/.
      # It is mounted at /docker-entrypoint-initdb.d inside the postgres container
      # and is executed automatically on first startup (empty PVC).
      # NOTE: initdb scripts do NOT re-run if the PVC already contains data.
      #       For schema changes on an existing database use a migration Job or
      #       kubectl exec into the postgres pod.
      - name: Apply database init ConfigMap
        run: |
          kubectl create configmap postgres-init-sql \
            -n "$NAMESPACE" \
            --from-file=01-setup.sql=db/setup.sql \
            --from-file=02-schema.sql=db/schema.sql \
            --from-file=03-triggers.sql=db/triggers.sql \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Roll out new images to impulsa ────────────────────────────────────
      - name: Deploy to impulsa
        run: |
          TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
          cd k8s/overlays/prod
          kustomize edit set image \
            acrimpulsaedu.azurecr.io/impulsaedu-api-service:${TAG} \
            acrimpulsaedu.azurecr.io/impulsaedu-auth-service:${TAG} \
            acrimpulsaedu.azurecr.io/impulsaedu-frontend:${TAG}
          kubectl apply -k . -n "$NAMESPACE"

      # ── Wait for rollouts to complete ─────────────────────────────────────
      - name: Verify rollout
        run: |
          for svc in api-service auth-service frontend; do
            if ! kubectl rollout status deployment/$svc -n "$NAMESPACE" --timeout=5m; then
              echo "::error::Rollout failed for $svc — cluster diagnostics:"
              kubectl describe deployment/$svc -n "$NAMESPACE"
              kubectl get pods -n "$NAMESPACE" -l "app=$svc" -o wide
              kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -30
              exit 1
            fi
          done
