apiVersion: v1
kind: LimitRange
metadata:
  name: impulsa-limits
  namespace: impulsa
spec:
  limits:
    - type: Container
      # Applied when a container omits resource fields
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      # Hard ceiling per container — prevents any single pod from starving the namespace
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi
    - type: PersistentVolumeClaim
      max:
        storage: 10Gi
