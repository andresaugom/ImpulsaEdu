apiVersion: v1
kind: Secret
metadata:
  name: impulsa-secrets
  namespace: impulsa-dev
type: Opaque
# Values must be base64-encoded. Replace placeholders before applying.
# Example: echo -n 'mysecret' | base64
data:
  DB_PASSWORD: ""   # base64-encoded database password
  JWT_SECRET: ""    # base64-encoded JWT signing secret
