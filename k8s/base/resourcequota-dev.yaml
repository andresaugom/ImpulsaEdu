apiVersion: v1
kind: ResourceQuota
metadata:
  name: impulsa-dev-quota
  namespace: impulsa-dev
spec:
  hard:
    # Compute — sized for 1x Standard_B2s workloads node (2 vCPU / 4 GB)
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 4Gi
    # Object counts
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
    secrets: "20"
    configmaps: "20"
